# config/sources.yaml — AI Vector source list
# Last updated: 2026-05-23 (Source Engineer research round)
#
# Trust weights:
#   1 = experimental / firehose / unproven
#   2 = new (default for fresh adds) / watch-tier
#   3 = established / reliable
#   4 = known-curated, high signal density
#   5 = reserved — earn over months of observed quality
#
# tier_expectation:
#   tier-1          — publishes mostly Agentic + Generative AI (the heart of AI Vector)
#   tier-1-mixed    — Tier 1 AND some Tier 2 / Tier 3 (broad AI news sites)
#   load-bearing-tier-2 — Tier 2 stories that are often load-bearing for practitioners
#   risk-tier-3     — high risk of Tier 3 noise; Eval Engineer should watch drift
#
# URL probe discipline: all feeds probed via WebFetch or confirmed via WebSearch 2026-05-23.
# Feeds marked enabled: false are either dead/no-official-feed (with workaround noted),
# or blocked from the research environment and pending confirmation from the pipeline runner.
#
# Third-party community feeds (Olshansk/rss-feeds, taobojlen/anthropic-rss-feed):
#   These are structured XML feeds maintained by community GitHub projects running on hourly
#   GitHub Actions. They are treated as RSS feeds (not live scraping) by the pipeline.
#   Dependency risk: if maintainers pause, feeds go stale silently. Monitor monthly.
#   See docs/internal/SOURCES_RESEARCH.md for full dependency discussion and Arman's TODO items.
#
# Master source list and research rationale: docs/internal/SOURCES_RESEARCH.md
# That document is the single source of truth. Update it first when adding/removing sources.

