    notes: >
      Confirmed live 2026-05-23 — valid RSS 2.0. CL firehose; highest per-paper LLM/language
      relevance of the arXiv feeds. Trust weight 1; heavy filtering required.
      Recommendation: start with cs.CL only; disable cs.AI and cs.LG in month 1 and re-enable
      only if HF Daily Papers misses meaningful signal. See docs/internal/SOURCES_RESEARCH.md §TODO #8.
      Note: arXiv RSS declares <skipDays>Saturday/Sunday</skipDays> — weekend runs will see
      items_in=0 with missed_reason=empty_feed. This is correct, not a fetch bug.

  - name: arXiv cs.AI
