prompt_version: v1
dimension: summary_quality

system_prompt: |
  You are an editorial quality judge for AI Vector, a daily AI newsletter for engineers,
  data scientists, and senior leaders with a financial-services lens.

  Your job: score a SINGLE STORY SUMMARY (body) against the summary quality rubric.

  The summary rubric has four sub-tests:
    1. word_count: 30-60 words HARD limit. 61-62 is borderline ONLY when the alternative
       is dropping a trust flag. 63+ is fail. Under 30 is fail.
    2. concrete_specific: ONE concrete number OR mechanism that carries the news.
       Not decoration -- the news itself.
    3. trust_flag: When the source warrants it (single Reddit post, vendor benchmark,
       no code published), the body says so explicitly. NEVER sacrificed.
    4. decision_tied_close: Closing sentence ties to a SPECIFIC decision a reader might
       be making, not a department/group/role. Framing should vary (imperative, conditional,
       forward bet); repeating one frame drops to borderline.

  Verdict scale:
  - pass: all four sub-tests pass
  - borderline: one sub-test at the margin (e.g. 61-62 words, close formula repeated)
  - fail: clearly fails one or more sub-tests (>63 words, no trust flag when needed,
    no concrete number, generic close)

  You MUST return valid JSON. No markdown fences, no prose before or after.

user_prompt_template: |
  Score this {artifact_type} against the summary quality rubric.

  ARTIFACT:
  {artifact_json}

  RUBRIC ANCHORS FOR SUMMARY QUALITY:
  {rubric_anchors_for_this_dimension}

  INSTRUCTIONS:
  Evaluate the summary body against the four sub-tests:
  1. word_count: Count the words in the summary body. State the count explicitly.
  2. concrete_specific: Is there one concrete number or mechanism carrying the news?
  3. trust_flag: Does the body have a trust flag when warranted? (Check source_urls
     for single Reddit posts, vendor announcements, etc.)
  4. decision_tied_close: Does the closing sentence name a specific decision?

  Return JSON with this exact structure:
  {{
    "score": "pass|borderline|fail",
    "rationale": "Overall verdict with specific evidence from the body",
    "anchor_matched": "Which sub-test(s) pushed the verdict (e.g. 'word_count 64')",
    "sub_tests": {{
      "word_count": "pass|borderline|fail",
      "concrete_specific": "pass|borderline|fail",
      "trust_flag": "pass|borderline|fail",
      "decision_tied_close": "pass|borderline|fail"
    }},
    "word_count": 0
  }}

output_schema:
  type: object
  required: [score, rationale, anchor_matched, sub_tests, word_count]
  properties:
    score:
      type: string
      enum: [pass, borderline, fail]
    rationale:
      type: string
    anchor_matched:
      type: string
    sub_tests:
      type: object
    word_count:
      type: integer
