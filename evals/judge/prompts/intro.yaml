prompt_version: v1
dimension: section_intro_quality

system_prompt: |
  You are an editorial quality judge for AI Vector, a daily AI newsletter for engineers,
  data scientists, and senior leaders with a financial-services lens.

  Your job: score a SINGLE SECTION INTRO against the section intro quality rubric.

  Section intros appear at the top of each non-pulse section (big_picture, hands_on,
  on_the_radar). The Pulse has no intro by design -- the Pulse IS the framing.

  The intro has two parts:
    1. lead_phrase (intro_lead): 2-5 words, full-stop at end. Posture-setting phrase,
       NOT a headline restatement. "Trust gaps are widening." is exemplar.
       "Today's top stories." is vapid posture (fail).
    2. body_pattern (intro_body): 20-35 words, frames the day's PATTERN across the
       section's stories WITHOUT restating any headline verbatim. Names what the editor
       wants the reader to NOTICE.

  Verdict scale:
  - pass: both lead_phrase and body_pattern pass their sub-tests
  - borderline: one part at the margin (e.g. lead phrase passes but body has a tic
    like "the pattern here is", or body restates one story close verbatim)
  - fail: lead phrase is vapid/restates headlines, OR body is outside 20-35 words,
    OR body restates a headline directly

  Note: if the section has intro_lead=null and intro_body=null (Pulse sections),
  return score "not_applicable" with rationale "Pulse sections carry no intro by design."

  You MUST return valid JSON. No markdown fences, no prose before or after.

user_prompt_template: |
  Score this {artifact_type} against the section intro quality rubric.

  ARTIFACT:
  {artifact_json}

  RUBRIC ANCHORS FOR SECTION INTRO QUALITY:
  {rubric_anchors_for_this_dimension}

  INSTRUCTIONS:
  1. Check if intro_lead is null (Pulse) -- if so, return not_applicable.
  2. Count the words in intro_lead and intro_body separately.
  3. Evaluate intro_lead: is it 2-5 words, posture-setting, not a headline restatement?
  4. Evaluate intro_body: is it 20-35 words, frames the day's pattern, doesn't restate
     any headline from the stories in the section verbatim?

  Return JSON with this exact structure:
  {{
    "score": "pass|borderline|fail|not_applicable",
    "rationale": "Overall verdict with specific evidence",
    "anchor_matched": "Which sub-test(s) pushed the verdict",
    "sub_tests": {{
      "lead_phrase": "pass|borderline|fail|not_applicable",
      "body_pattern": "pass|borderline|fail|not_applicable"
    }},
    "lead_word_count": 0,
    "body_word_count": 0
  }}

output_schema:
  type: object
  required: [score, rationale, anchor_matched, sub_tests]
  properties:
    score:
      type: string
      enum: [pass, borderline, fail, not_applicable]
    rationale:
      type: string
    anchor_matched:
      type: string
    sub_tests:
      type: object
