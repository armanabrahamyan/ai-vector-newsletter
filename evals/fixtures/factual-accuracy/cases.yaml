# evals/fixtures/factual-accuracy/cases.yaml
#
# Owner: Eval Engineer.
# Purpose: Labelled fixture set for Eval 7 — factual-accuracy verifier calibration.
#
# Each case is a quadruple: (headline, summary_text, source_excerpt, per-claim ground truth).
# Claims are atomic factual assertions decomposed from the headline AND the summary body.
# The verifier callable (see evals/run_evals.py::eval_factual_accuracy) will:
#   1. Receive (headline, body, source_excerpt).
#   2. Decompose headline AND body into atomic claims.
#   3. Return a verdict per claim: supported / unsupported / contradicted / unverifiable.
#   4. Carry a `location` field per returned claim: "headline" or "body".
# The harness compares those verdicts against ground_truth_verdict here.
#
# Per-claim ground truth now includes a `location` field:
#   "headline" — the claim is drawn from the headline (title); a factual error here
#                is the most severe kind (readers see and trust the headline first).
#   "body"     — the claim is drawn from the summary body.
#
# Categories:
#   supported           Real headline + summary + real (representative) source excerpt.
#                       Verifier must NOT flag these. Exercises legitimate compression
#                       transformations: number-rounding, generalisation,
#                       jargon->plain English, paraphrase. Headline claims in supported
#                       cases exercise the recognition-rule named actors that ARE
#                       supported by the source.
#   contradicted        Same triple with one injected factual mutation. Verifier must
#                       catch it.
#                       mutation_type: numeric_substitution | entity_substitution |
#                                      directional_inversion | dropped_trust_flag |
#                                      headline_error
#                       For headline_error cases, the body is left CORRECT; the error
#                       lives only in the headline. These cases test the verifier's
#                       ability to catch headline-level factual errors specifically and
#                       to attribute the flag to location=headline.
#   unverifiable        Summary makes a claim the source excerpt does not address.
#                       Verifier should say "unverifiable", not "contradicted".
#
# Fixture IDs use the story_id (cluster_id) from the relevant released issue as
# the base, with a suffix to distinguish mutation variants.
# Headline-error fixtures use the fa_6xx series.
#
# Source: real summaries + real headlines pulled from data/released/ issues #13–17
# (2026-06-04 to 2026-06-08). Source excerpts are constructed to represent what a
# ~1000-word trafilatura extraction from the linked URL would return. All numeric and
# entity details match the published summaries exactly for the "supported" category;
# mutations are applied only in "contradicted" entries.
#
# Schema version: 2
#   v2 changes vs v1:
#     - Added `headline` field to every case.
#     - Added `location` field to every per-claim ground-truth entry.
#     - Added 4 headline_error contradicted cases (fa_601–fa_604).

schema_version: 2

cases:

  # ===========================================================================
  # CATEGORY 1: SUPPORTED / FALSE-POSITIVE TRAPS (8 cases)
  # Real headlines + summaries correctly compressing/rounding/paraphrasing
  # real source text. These are the hardest legitimate transformations —
  # verifier must NOT flag them. Headline claims use real named actors that
  # ARE supported by the source (recognition-rule positive controls).
  # ===========================================================================

  - id: "fa_001_supported"
    category: "supported"
    story_id: "c_4b7f11d142babc90"
    issue_date: "2026-06-07"
    source_url: "https://simonwillison.net/2026/Jun/5/openai-help-lockdown-mode/#atom-everything"
    transformation_type: "paraphrase_plus_jargon_to_plain_english"
    headline: >
      ChatGPT now blocks the final step in prompt-injection data theft
    summary_text: >
      Prompt injection attacks follow a three-step pattern: reach private data, manipulate
      the model, exfiltrate the result. OpenAI's Lockdown Mode cuts the third leg by blocking
      outbound network requests deterministically, without relying on AI judgement that can
      itself be subverted. It doesn't stop injections entering; it stops data leaving. Default
      ChatGPT settings offer no such guarantee.
    source_excerpt: >
      OpenAI has released a new security feature called Lockdown Mode for ChatGPT. The feature
      is designed to prevent a class of attacks known as prompt injection exfiltration, in which
      malicious instructions embedded in content the model reads attempt to extract private user
      data to external servers.

      Prompt injection exfiltration attacks generally work in three stages. First, the attacker
      places malicious instructions somewhere the model will encounter them — in a document, an
      email, or a web page. Second, those instructions attempt to manipulate the model into
      processing private information from the user's context. Third, the instructions direct
      the model to send that information to an external URL controlled by the attacker.

      Lockdown Mode addresses the third stage directly. When enabled, ChatGPT blocks all outbound
      network requests made by the model during a session. This is a deterministic, code-level
      block: the model cannot make network calls regardless of what instructions it receives.
      Unlike AI-based content moderation, a deterministic block cannot itself be subverted by
      cleverly phrased instructions.

      The feature does not prevent the first two stages of the attack. Malicious instructions
      can still reach the model, and the model can still be influenced. Lockdown Mode specifically
      prevents the exfiltration step.

      ChatGPT's default settings do not enable Lockdown Mode. Users who want this protection
      must enable it manually in their settings. OpenAI has not announced plans to make it the
      default.
    claims:
      - claim: "ChatGPT now blocks the final step in prompt-injection data theft"
        ground_truth_verdict: "supported"
        location: "headline"
        notes: "Source: Lockdown Mode addresses the third stage (exfiltration) directly. 'Final step' = third stage = exfiltration = data theft completion. Correct."
      - claim: "Prompt injection attacks follow a three-step pattern"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source explicitly lists three stages."
      - claim: "The first step is reaching private data"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source says 'processing private information from the user's context'."
      - claim: "The second step is manipulating the model"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source says 'those instructions attempt to manipulate the model'."
      - claim: "The third step is exfiltrating the result"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source says 'send that information to an external URL'."
      - claim: "Lockdown Mode blocks outbound network requests deterministically"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source says 'deterministic, code-level block'."
      - claim: "Lockdown Mode does not rely on AI judgement"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source says 'Unlike AI-based content moderation, a deterministic block cannot itself be subverted'."
      - claim: "Lockdown Mode stops data leaving but does not stop injections entering"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source explicitly: 'does not prevent the first two stages'."
      - claim: "Default ChatGPT settings do not offer Lockdown Mode protection"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'ChatGPT's default settings do not enable Lockdown Mode'."

  - id: "fa_002_supported"
    category: "supported"
    story_id: "c_6f59026637ded719"
    issue_date: "2026-06-07"
    source_url: "https://huggingface.co/blog/ibm-research/agent-logic-and-scalable-ai-adoption"
    transformation_type: "number_rounding_and_generalisation"
    headline: >
      Structured agent logic cuts token use 30-fold, IBM tests show
    summary_text: >
      IBM Research argues that layering structured logic beneath a language model slashes costs
      and errors. Their legacy-code agent consumed 30 times fewer tokens than a frontier-only
      baseline; a test-generation tool hit 20-45% better code coverage. All benchmarks are
      vendor-supplied. Ask for independent replication before committing your agent architecture.
    source_excerpt: >
      IBM Research has published results from two internal agent systems that combine language
      models with structured logic layers.

      The first system, a legacy code modernisation agent, was built to refactor COBOL and
      Fortran codebases. The system chains a language model with a formal static analyser that
      pre-identifies code structures before the LLM is invoked. In internal benchmarks, this
      hybrid approach consumed approximately 30 times fewer tokens than a baseline system that
      used a frontier language model alone to process the code without pre-analysis. IBM
      attributes this primarily to the structured analyser narrowing the LLM's task scope.

      The second system, a test generation tool, layers a symbolic coverage tracker with a
      language model that writes test cases. IBM reports code coverage improvements of between
      20% and 45% over baselines on internal test suites, with the range reflecting variation
      across different code types and programming languages.

      Both systems were evaluated internally at IBM Research. No independent third-party
      replication has been published. The blog post does not provide access to the underlying
      benchmarks or the specific codebases used for evaluation.

      IBM frames this as evidence that structured logic — static analysis, symbolic reasoning,
      and formal verification — can reduce the amount of work a language model needs to do,
      making agents both cheaper and more reliable. The post does not make claims about
      applicability outside IBM's internal workloads.
    claims:
      - claim: "Structured agent logic cuts token use 30-fold in IBM tests"
        ground_truth_verdict: "supported"
        location: "headline"
        notes: "Source: 'approximately 30 times fewer tokens'. '30-fold' is correct. 'IBM tests show' is accurate attribution to IBM's internal benchmarks."
      - claim: "IBM Research argues that layering structured logic beneath a language model slashes costs and errors"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source confirms the argument about combining structured logic with LLMs to reduce cost and errors."
      - claim: "Their legacy-code agent consumed 30 times fewer tokens than a frontier-only baseline"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source says 'approximately 30 times fewer tokens than a baseline system'."
      - claim: "A test-generation tool hit 20-45% better code coverage"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source says 'between 20% and 45% over baselines'."
      - claim: "All benchmarks are vendor-supplied"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'evaluated internally at IBM Research. No independent third-party replication'."

  - id: "fa_003_supported"
    category: "supported"
    story_id: "c_569fd49abc96bd13"
    issue_date: "2026-06-07"
    source_url: "https://www.latent.space/p/axiom"
    transformation_type: "generalisation_plus_paraphrase"
    headline: >
      Formal proof may be the missing ingredient for AI that compounds
    summary_text: >
      Axiom scored 187/189 (99%) on a code-correctness benchmark where OpenAI's leading
      reasoning model scored 4.9%. The argument: formal proof verification gives reinforcement
      learning a cleaner signal than statistical methods, letting gains compound rather than
      plateau. Vendor-reported, no independent replication yet.
    source_excerpt: >
      Axiom AI has published benchmark results on a code correctness evaluation suite. The
      suite contains 189 problems. Axiom's system scored 187 out of 189 correct, which is
      approximately 99%. On the same benchmark, OpenAI's o3 model scored 4.9%.

      The founders argue that the performance gap stems from the training signal used during
      reinforcement learning. Standard language model RL training uses statistical or
      heuristic reward signals — the model receives feedback about whether its output looks
      correct. Axiom's system uses formal proof verification as the reward signal. After the
      model produces code, a formal verifier checks whether the code is mathematically
      provably correct, returning a binary pass or fail.

      The team argues that proof verification provides a crisper, less ambiguous training
      signal than statistical approximation. This crisper signal allows learning improvements
      to accumulate over time rather than approaching a performance ceiling, a process they
      describe as "compounding."

      Axiom AI is a small startup. These benchmarks are vendor-reported. No independent
      third-party replication of the results has been published. The Latent Space article
      is a podcast write-up based on a founder interview, not an independent review.
    claims:
      - claim: "Formal proof may be the missing ingredient for AI that compounds"
        ground_truth_verdict: "supported"
        location: "headline"
        notes: "Source: Axiom argues proof verification enables compounding gains. 'May be' is a correctly hedged summary of an argument, not an overclaim. Supported."
      - claim: "Axiom scored 187/189 (99%) on a code-correctness benchmark"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source confirms '187 out of 189 correct, which is approximately 99%'."
      - claim: "OpenAI's leading reasoning model scored 4.9% on the same benchmark"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'OpenAI's o3 model scored 4.9%'."
      - claim: "Formal proof verification gives reinforcement learning a cleaner signal than statistical methods"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source explicitly describes this argument."
      - claim: "Vendor-reported, no independent replication yet"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'These benchmarks are vendor-reported. No independent third-party replication'."

  - id: "fa_004_supported"
    category: "supported"
    story_id: "c_dec53cd12f76d885"
    issue_date: "2026-06-04"
    source_url: "https://huggingface.co/blog/huggingface/hf-cli-agent-optimization"
    transformation_type: "number_rounding_consumer_gpu_generalisation"
    headline: >
      Hugging Face rebuilt its CLI to cut agent token use sixfold
    summary_text: >
      Coding agents (Claude Code, Codex, Cursor) already drive nearly 49 million Hub requests.
      Hugging Face rebuilt the hf CLI so agents auto-receive untruncated TSV output instead of
      human-formatted tables, cutting token use by up to six times on multi-step tasks.
      Benchmarks are vendor-supplied. Swap your pipeline's Hub calls to hf v1.9.0 and measure
      token consumption.
    source_excerpt: >
      Hugging Face has released version 1.9.0 of the hf command-line interface. The release
      is specifically designed to improve how AI coding agents interact with the Hugging Face
      Hub.

      The background: Hugging Face reports that coding agents including Claude Code, Codex, and
      Cursor collectively drive approximately 49 million requests to the Hub. The CLI's previous
      output format used human-readable aligned tables with padding, headers, and truncated
      field values. This format is useful for humans reading a terminal but wastes tokens when
      a language model is parsing the output programmatically.

      The new version auto-detects agent execution environments and switches output format to
      tab-separated values (TSV) with complete, untruncated field values. The model does not
      need to request this format; the CLI detects the context automatically.

      In internal benchmarks on multi-step Hub tasks, Hugging Face reports that this format
      change reduced token consumption by up to six times (6x). The reduction varies by task
      type; tasks that require multiple Hub lookups in sequence show the largest improvement.

      The benchmarks were conducted internally by Hugging Face. No third-party evaluation has
      been published. The improvement is specific to CLI-mediated Hub interactions; it does not
      affect API calls made directly to Hub endpoints.
    claims:
      - claim: "Hugging Face rebuilt its CLI to cut agent token use sixfold"
        ground_truth_verdict: "supported"
        location: "headline"
        notes: "Source: 'reduced token consumption by up to six times (6x)'. 'Sixfold' = 6x. 'Rebuilt its CLI' matches 'released version 1.9.0'. Correct."
      - claim: "Coding agents including Claude Code, Codex, and Cursor drive nearly 49 million Hub requests"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'approximately 49 million requests'."
      - claim: "Hugging Face rebuilt the hf CLI so agents auto-receive untruncated TSV output"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source confirms TSV output with untruncated fields."
      - claim: "The change cuts token use by up to six times on multi-step tasks"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'reduced token consumption by up to six times (6x)'."
      - claim: "Benchmarks are vendor-supplied"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'internal benchmarks ... No third-party evaluation has been published'."

