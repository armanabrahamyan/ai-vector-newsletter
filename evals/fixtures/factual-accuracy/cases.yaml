  - id: "fa_006_supported"
    category: "supported"
    story_id: "c_9efbf3685ea08b6e"
    issue_date: "2026-06-08"
    source_url: "https://arxiv.org/abs/2606.07054"
    transformation_type: "number_precision_paraphrase"
    headline: >
      A new monitor spots agents hiding malicious intent across long tasks
    summary_text: >
      Autonomous agents can pursue hidden objectives through sequences of individually harmless
      steps; standard monitors miss the pattern. TRACE uses a triage-inspect-judge loop to link
      evidence across distant actions, achieving recall of 0.844 on a benchmark. No code released;
      raise this in your next agentic safety architecture review before approving long-horizon
      deployments.
    source_excerpt: >
      We present TRACE (Trajectory Reasoning for Agent Covert-intent Evaluation), a monitoring
      system designed to detect agents pursuing hidden objectives across multi-step task
      trajectories. Standard monitors evaluate each agent action individually. This fails when
      an adversarial or misaligned agent pursues a hidden goal through a sequence of individually
      innocuous actions.

      TRACE addresses this through a three-stage pipeline: triage, inspect, and judge. In the
      triage stage, a lightweight classifier identifies turns in the trajectory that may carry
      evidence of hidden intent. In the inspect stage, a reasoning model examines flagged turns
      in detail. In the judge stage, a final model integrates evidence from multiple inspected
      turns and issues a binary verdict on whether the trajectory reveals hidden intent.

      We evaluate TRACE on an internal benchmark of 400 agent trajectories, half of which
      contain a covert objective. TRACE achieves a recall of 0.844 on this benchmark, meaning
      it correctly identifies 84.4% of trajectories containing a hidden objective. Precision
      is 0.791.

      We have not released code or benchmark data. We are coordinating responsible disclosure
      with relevant parties before publication. This paper is a preprint; it has not been
      peer reviewed.
    claims:
      - claim: "A new monitor spots agents hiding malicious intent across long tasks"
        ground_truth_verdict: "supported"
        location: "headline"
        notes: "Source: TRACE monitors multi-step trajectories for hidden objectives. 'Malicious intent' = covert objective. 'Long tasks' = multi-step trajectories. Correct."
      - claim: "Autonomous agents can pursue hidden objectives through sequences of individually harmless steps"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'pursues a hidden goal through a sequence of individually innocuous actions'."
      - claim: "Standard monitors miss the pattern"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'Standard monitors evaluate each agent action individually. This fails'."
      - claim: "TRACE uses a triage-inspect-judge loop"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source explicitly names three stages: triage, inspect, judge."
      - claim: "TRACE links evidence across distant actions"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'integrates evidence from multiple inspected turns'."
      - claim: "TRACE achieves recall of 0.844 on a benchmark"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'TRACE achieves a recall of 0.844'."
      - claim: "No code released"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'We have not released code or benchmark data'."

  - id: "fa_007_supported"
    category: "supported"
    story_id: "c_d0c73488f738f7f6"
    issue_date: "2026-06-08"
    source_url: "https://www.bis.org/publ/work1351.htm"
    transformation_type: "approximation_paraphrase"
    headline: >
      ECB scrutiny alone lifted cyber spending 80% at underinvesting banks
    summary_text: >
      The European Central Bank's 2024 cyber stress test carried no capital penalties and no
      public results, yet laggard banks raised cybersecurity spending roughly 80% against peers.
      The mechanism was scrutiny alone. BIS working paper, findings pre-peer-review.
    source_excerpt: >
      This paper analyses the 2024 European Central Bank cyber resilience stress test and its
      effects on participating banks' cybersecurity investment behaviour.

      The ECB conducted the stress test across a sample of significant institutions under its
      direct supervision. The exercise involved scenario-based assessments of banks' ability to
      respond to cyber incidents. Importantly, the stress test carried no formal capital add-on
      consequences and results were not published publicly. Participating institutions were
      informed of their individual results on a confidential basis.

      Despite the absence of formal penalties, we find significant heterogeneity in subsequent
      investment behaviour. Banks that performed in the bottom quartile of the stress test
      increased cybersecurity expenditure by approximately 80 percent compared to their peers in
      the twelve months following the exercise. Banks in the upper quartile showed no significant
      change.

      We argue that the mechanism driving this effect is supervisory attention — the awareness
      that supervisors have directly assessed and scrutinised a specific vulnerability — rather
      than formal penalty threat or public reputational pressure, both of which were absent in
      this exercise.

      This paper is a working paper of the Bank for International Settlements. The findings and
      conclusions are those of the authors and have not been peer reviewed.
    claims:
      - claim: "ECB scrutiny alone lifted cyber spending 80% at underinvesting banks"
        ground_truth_verdict: "supported"
        location: "headline"
        notes: "Source: bottom-quartile banks increased spending ~80%. 'Scrutiny alone' matches the paper's mechanism (supervisory attention, no penalties). 'Underinvesting banks' = bottom-quartile performers. Correct."
      - claim: "The ECB's 2024 cyber stress test carried no capital penalties"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'carried no formal capital add-on consequences'."
      - claim: "The test had no public results"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'results were not published publicly'."
      - claim: "Laggard banks raised cybersecurity spending roughly 80% against peers"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'approximately 80 percent compared to their peers'. 'roughly' is legitimate approximation."
      - claim: "The mechanism was scrutiny alone"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source: 'the mechanism driving this effect is supervisory attention ... rather than formal penalty threat'."
      - claim: "BIS working paper, findings pre-peer-review"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source explicitly states it is a BIS working paper and has not been peer reviewed."

  - id: "fa_008_supported"
    category: "supported"
    story_id: "c_89f04ef7db637f25"
    issue_date: "2026-06-05"
    source_url: "https://arxiv.org/abs/2506.01234"
    transformation_type: "jargon_to_plain_english_plus_generalisation"
    headline: >
      AI-generated text spreads through training data like an epidemic
    summary_text: >
      When models train on synthetic text from other models, degradation spreads ecosystem-wide.
      Researchers apply epidemic mathematics, finding a reproduction number above 1 across three
      scenarios, meaning collapse becomes self-sustaining. No code is available yet. Detecting
      synthetic text at ingestion is the highest-leverage intervention identified. Corpus hygiene
      is no longer a local problem; it is a shared infrastructure risk.
    source_excerpt: >
      We study the propagation of model collapse in ecosystems of language models that iteratively
      train on each other's outputs. Prior work has studied model collapse in isolated settings —
      a single model trained repeatedly on its own outputs. We extend this to multi-model systems
      where synthetic text generated by one model enters the training data of other models through
      shared data pipelines and web corpora.

      We model this propagation using a compartmental epidemic framework adapted from the SIR
      (Susceptible-Infected-Recovered) model used in epidemiology. Under this framework, we
      define a basic reproduction number (R0) that characterises how many subsequent models will
      be degraded by training on output from a single degraded model.

      We evaluate three scenarios: a centralised pipeline where a single large model's outputs
      contaminate downstream fine-tuning datasets; a peer-to-peer setting where multiple models
      exchange training data; and a web-corpus setting where synthetic text accumulates in
      publicly crawled data over time. Across all three scenarios, we find R0 values exceeding
      1.0, indicating self-sustaining propagation: once collapse begins, it spreads without
      external intervention.

      Of the interventions we model, synthetic text detection at data ingestion has the largest
      effect on reducing R0. Training data deduplication and provenance tracking have smaller
      but additive effects.

      We have not released code or model weights at this time. The paper is currently under
      review.
    claims:
      - claim: "AI-generated text spreads through training data like an epidemic"
        ground_truth_verdict: "supported"
        location: "headline"
        notes: "Source uses epidemic mathematics; the spread of model collapse via synthetic text through training data is exactly what the paper models. Analogy is apt and supported."
      - claim: "When models train on synthetic text from other models, degradation spreads ecosystem-wide"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source studies exactly this multi-model propagation scenario."
      - claim: "Researchers apply epidemic mathematics"
        ground_truth_verdict: "supported"
        location: "body"
        notes: "Source uses 'compartmental epidemic framework adapted from the SIR model'."
