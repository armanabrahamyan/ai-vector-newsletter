    source_excerpt: >
      ServiceNow has published EVA-Bench 2.0, a benchmark for evaluating enterprise voice agents.

      The benchmark covers 213 distinct scenarios drawn from three industry verticals: airline
      customer service, IT help desk, and healthcare administration. Across these 213 scenarios,
      the benchmark defines a total of 121 unique tools available to the voice agent. Tools
      include actions like flight rebooking APIs, ticket creation endpoints, appointment scheduling
      systems, and policy lookup functions.

      Each scenario is designed to have exactly one correct resolution path. ServiceNow argues
      that multi-path scenarios introduce evaluation ambiguity: two agents can arrive at different
      valid solutions, making head-to-head comparison noisy. The single-path constraint reduces
      this ambiguity, though it also means the benchmark penalises creative but valid alternatives.

      The benchmark dataset is publicly available for download on Hugging Face. The evaluation
      harness is also open. ServiceNow reports that all 213 scenarios were manually validated by
      human evaluators before inclusion.

      EVA-Bench 2.0 was created and validated entirely by ServiceNow. No independent academic
      group has co-authored or independently replicated the benchmark.
