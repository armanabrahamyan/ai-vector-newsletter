# evals/labels.yaml — AI Vector Ground-Truth Labels
#
# Owner: Eval Engineer (structure + harness integration).
# Co-owner: Editor (voice_label, tier_label, arman_cut_reasons).
# Input: Arman's ratification patterns (per-issue, daily).
#
# This file is the labelled ground truth the harness runs against.
# Three sections:
#   1. per_cluster    — dedup + relevance ground truth per cluster
#   2. per_issue      — post-publication quality signals per issue
#   3. per_source     — rolling tier-mix and signal-density observations
#
# SYNTHETIC ENTRIES (marked [SYNTHETIC]) exist only to validate the
# harness's plumbing. Do NOT remove them.
#
# ============================================================
# BOOTSTRAP CORPUS — 2 dates only (2026-05-23 and 2026-05-24)
# ============================================================
# Phase A was executed against the first two released dates.
# Plan target was 5 dates × ~10 clusters; we have ~2 dates × ~10
# labelled clusters each (~20 clusters total).
# All per_cluster entries below from real dates are DRAFT only.
# ground_truth_group_id and expected_tier are Eval Engineer drafts.
# human_relevance is left blank for Arman to ratify.
# expected_audience_tags are Eval Engineer drafts (low-confidence flagged).
# This corpus grows as more dates ship. See RATIFICATION_PENDING.md.
# ============================================================
#
# Label cadence (once Phase 2 is running):
#   - Editor labels every ratified issue's clusters within 24 hours.
#   - Arman's cut reasons are logged by Editor after each ratification.
#   - Per-source rolling entries are updated weekly by Eval Engineer.
#   - Per-issue entries are filed after publication.
#
# Schema version: 1

schema_version: 1

# ---------------------------------------------------------------------------
# 1. PER-CLUSTER LABELS
#
# Fields:
#   cluster_id:         string  — matches Cluster.cluster_id (c_<12+ hex>)
#   dataset:            string  — fixture dataset name this cluster came from
#   ground_truth_group_id: string | null
#                               — Which clusters should have been merged into
#                                 one group? Assign the same group_id to all
#                                 clusters that represent the same canonical
#                                 story. If null, this cluster is a singleton
#                                 (no near-duplicate expected).
#                                 Naming: "g_<date>_<slug>" e.g. "g_20260601_claude4"
#   human_relevance:    int (1–5) | "~ # RATIFY: Arman, 1-5"
#                               — 1: noise / tier-3, should be cut
#                               — 2: low relevance, On the Radar at best
#                               — 3: relevant, earns a place in the issue
#                               — 4: strong, Hands-On or The Big Picture section
#                               — 5: pulse-worthy; the day's most important item
#   expected_audience_tags: list  — subset of [hands_on, big_picture, finance, general]
#   expected_tier:      string  — pulse | on_the_radar | cut
#   voice_label:        in-voice | off-voice | borderline (Editor fills post-ratification)
#   tier_label:         tier-1 | tier-2-load-bearing | tier-3 (Editor fills post-ratification)
#   notes:              str     — Free-form rationale for the labels above.
# ---------------------------------------------------------------------------

