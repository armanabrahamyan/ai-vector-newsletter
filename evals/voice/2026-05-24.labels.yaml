# ---------------------------------------------------------------------------
# Issue-level voice dimensions.
# ---------------------------------------------------------------------------

voice_dimensions:

  warmth:
    label: pass
    rationale: >
      Bodies address reader decisions directly throughout ("If you're
      choosing a document pipeline architecture this week..."; "If
      you're prototyping agentic finance workflows..."). Trust flags
      specific and varied. The FCA/BoE/Treasury body in particular
      reads as authored, not summarised.

  signal_density:
    label: pass
    rationale: >
      Every body carries its concrete number or mechanism. No "major"
      / "significant" / "important" doing the work of evidence.
      Section intros are tight. The c_7eb67898d3d843bd body could
      shave a clause ("with a pull request open for review" adds
      little) but the issue overall is lean.

  direction:
    label: pass
    rationale: >
      Every story closes on a specific decision or instrument.
      Framing varies: imperative ("clone it this week", "mandate a
      spec phase before generation"), conditional ("if you run
      llama.cpp on NVIDIA, pull this build..."), forward bet implied
      in the FCA piece. No single drumbeat across the issue.

  finance_lens_presence:
    label: pass
    rationale: >
      Exemplar calibration today. The FCA/BoE/Treasury Big Picture
      story is a Tier-1 FS hit named precisely (agency, decision,
      deadline -- "before your next operational resilience review").
      The TradingAgents Hands-On piece weaves a soft FS note
      ("prototyping agentic finance workflows") without forcing.
      Other stories stay out of the lens, correctly.

  callback_quality:
    label: not_applicable
    rationale: >
      Issue #2. The 14-day lookback would scan back to Issue #1
      (2026-05-23) for cross-time refs; none of today's clusters
      carry one. First real callback opportunity is issue #3+.

