    headline_quality:
      consequence_led: borderline
      length: fail
      no_forbidden_elements: pass
      rationale: >
        Headline is 17 words, ~100 chars: above both the 12-word and
        ~90-char caps. Consequence is present ("without sending files to
        the cloud") but buried behind a three-clause feature list. A
        tighter tagline: "A small open model reads invoices without
        sending the files anywhere."
    summary_quality:
      word_count: borderline
      concrete_specific: pass
      trust_flag: pass
      decision_tied_close: pass
      rationale: >
        ~63 words; over the 60 hard cap by three. Spec list ("PDFs,
        invoices, tables, and screenshots") is the obvious cut --
        collapses to "documents" without losing news. Trust flag and
        decision close both strong.
    signal_appropriateness:
      label: pass
      rationale: >
        "try" matches the body's "test this against your own document
        corpus before committing".
    overall: borderline
    editor_note: >
      The Pulse is the section we watch hardest. This one carries the
      right STORY -- open model for document extraction is a real
      practitioner decision -- but the headline and body both want a
      sharper hand. Worth flagging to LLM Engineer for the next prompt
      pass: Pulse should clear caps cleanly, every time.

