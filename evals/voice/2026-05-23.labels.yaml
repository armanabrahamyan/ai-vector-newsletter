# ---------------------------------------------------------------------------
# Section intros (non-pulse).
# ---------------------------------------------------------------------------

section_intros:

  big_picture:
    lead_phrase: pass
    body_pattern: pass
    rationale: >
      Lead: "Trust gaps are widening." (4 words, posture-setting,
      names the day's pattern.) Body: 28 words, frames the cross-
      story pattern ("infrastructure moving faster than anyone's
      ability to verify") without restating any headline. Strong.

  hands_on:
    lead_phrase: pass
    body_pattern: pass
    rationale: >
      Lead: "Verify before you deploy." (4 words, sharp imperative
      posture.) Body: 30 words, reads the day's pattern
      (single-source benchmarks across the section), names the
      posture (test, don't decide). Exemplar-grade.

  on_the_radar:
    lead_phrase: pass
    body_pattern: borderline
    rationale: >
      Lead: "For awareness only." (3 words, posture-setting.) Body
      uses "the pattern here is" -- a tic the voice block flags as
      cuttable -- and "deserves a watch, not yet a decision" lifts
      language from the section name. Reads in-voice but could
      land sharper.

# ---------------------------------------------------------------------------
# Editor's overall note for Arman.
# ---------------------------------------------------------------------------

overall_note: |
  Issue #1 lands in-voice on the meaningful axes -- direction is
  visible everywhere, trust flags are specific not boilerplate, and
  section intros frame rather than restate. The systematic finding
  is HEADLINE LENGTH: 6 of 10 headlines exceed either the ~90 char
  cap, the 12 word ideal, or both. This is a pattern, not a
  one-off; worth flagging to LLM Engineer for the next summarise
  prompt pass.

  Pulse is borderline -- right story, but the headline and body
  both want a sharper hand (~63 words vs 60 hard cap; 17-word
  headline). Pulse is the section we watch hardest; it should
  clear caps cleanly, every time.

  Finance lens: light-touch is correct calibration today. The
  deepfake / liveness story had a natural KYC angle that could
  have been named; otherwise the lens stays out, which is right.

  Nothing here is a cut. Everything is a sharpening. Recommend
  Arman ratify with the headline-length pattern flagged to LLM
  Engineer.
