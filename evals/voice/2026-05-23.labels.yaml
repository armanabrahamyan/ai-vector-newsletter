# evals/voice/2026-05-23.labels.yaml -- Issue #1 voice + quality labels
#
# Editor's draft for Arman's ratification (Phase A bootstrap).
# Pulled from /data/released/2026-05-23/issue.json.
#
# Verdict scale: pass | borderline | fail
# Every borderline / fail carries a one-line rationale tied to a specific
# headline, body sentence, or pattern in the issue.
#
# Editor's posture: this is a draft. Arman ratifies; the labels feed the
# Eval Engineer's voice harness (per evals/voice/rubric.yaml).

schema_version: 1
date: 2026-05-23
issue_number: 1
labelled_by: editor
labelled_against: "rubric v0.1-2026-05-24"

# ---------------------------------------------------------------------------
# Issue-level voice dimensions.
# ---------------------------------------------------------------------------

voice_dimensions:

  warmth:
    label: pass
    rationale: >
      Most stories address a specific reader decision ("ask your vendor
      for a dated retraining schedule before renewing", "test a specialist
      before defaulting to a small generalist"). Trust flags are specific,
      not boilerplate. The Hands-On intro reads as edited prose, not
      aggregator copy.

  signal_density:
    label: borderline
    rationale: >
      Strong for most bodies (the $160-to-$16 routing piece is exemplar
      lean). Drops on the Pulse summary, which stacks a four-item
      spec list ("PDFs, invoices, tables, and screenshots") that
      collapses to "documents" without losing news. Big Picture
      c_13639cc37f23d132 also opens with "The pattern is now undeniable"
      -- a hedge-padding scaffold that adds nothing.

  direction:
    label: pass
    rationale: >
      Every story closes on a specific decision or instrument. Framing
      varies: imperative ("ask your vendor..."), conditional ("if data
      residency stops you..."), instructional ("audit the full stack").
      No drumbeat single template across the issue.

  finance_lens_presence:
    label: borderline
    rationale: >
      Light-touch and not forced, which is correct calibration. BUT no
      Tier-1 FS story landed today and the issue does not acknowledge
      that. The deepfake / identity-verification piece (c_c997d4c916785564)
      has a natural KYC/onboarding angle that could have been named
      without forcing it; instead the close is generic-vendor framing.

  callback_quality:
    label: not_applicable
    rationale: >
      Issue #1; no prior issues to chain. Will reassess at issue #3+
      when cross_time_ref fields start populating.

# ---------------------------------------------------------------------------
# Per-story quality labels. Each story carries four sub-labels +
# overall rationale.
# ---------------------------------------------------------------------------

stories:

